<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      .cluster-bg { fill: #0a0a0a; }
      .gauge-bg { fill: #111; stroke: #333; stroke-width: 2; }
      .gauge-ring { fill: none; stroke: #222; stroke-width: 8; }
      .gauge-marks { fill: none; stroke: #444; stroke-width: 2; }
      .gauge-marks-major { fill: none; stroke: #666; stroke-width: 3; }
      .gauge-text { fill: #888; font-family: 'Arial', sans-serif; font-size: 12px; }
      .gauge-value { fill: #fff; font-family: 'Arial', sans-serif; font-size: 28px; font-weight: bold; }
      .gauge-unit { fill: #666; font-family: 'Arial', sans-serif; font-size: 14px; }
      .gauge-label { fill: #888; font-family: 'Arial', sans-serif; font-size: 11px; text-transform: uppercase; }
      .needle { fill: #ff3333; stroke: #aa0000; stroke-width: 1; }
      .needle-cap { fill: #333; stroke: #222; stroke-width: 1; }
      .warning-light { stroke: #333; stroke-width: 1; cursor: pointer; transition: fill 0.3s, filter 0.3s; }
      .warning-light.off { fill: #1a1a1a; }
      .warning-light.on { filter: drop-shadow(0 0 8px currentColor); }
      .warning-icon { fill: #1a1a1a; pointer-events: none; }
      .warning-light.on .warning-icon { fill: currentColor; }
      .info-display { fill: #001a00; stroke: #333; stroke-width: 1; }
      .info-text { fill: #00ff00; font-family: 'Courier New', monospace; font-size: 14px; }
      .fuel-gauge { fill: #111; stroke: #333; stroke-width: 1; }
      .fuel-level { fill: #00aaff; }
      .temp-gauge { fill: #111; stroke: #333; stroke-width: 1; }
      .temp-level { fill: linear-gradient(#00aaff, #ff4444); }
      .divider { stroke: #222; stroke-width: 1; }
    </style>

    <!-- Gauge tick marks template -->
    <g id="speed-ticks">
      <!-- Major ticks every 20 mph, minor every 10 -->
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-135)"/>
      <line x1="0" y1="-95" x2="0" y2="-88" stroke="#444" stroke-width="2" transform="rotate(-121.5)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-108)"/>
      <line x1="0" y1="-95" x2="0" y2="-88" stroke="#444" stroke-width="2" transform="rotate(-94.5)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-81)"/>
      <line x1="0" y1="-95" x2="0" y2="-88" stroke="#444" stroke-width="2" transform="rotate(-67.5)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-54)"/>
      <line x1="0" y1="-95" x2="0" y2="-88" stroke="#444" stroke-width="2" transform="rotate(-40.5)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-27)"/>
      <line x1="0" y1="-95" x2="0" y2="-88" stroke="#444" stroke-width="2" transform="rotate(-13.5)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(0)"/>
      <line x1="0" y1="-95" x2="0" y2="-88" stroke="#444" stroke-width="2" transform="rotate(13.5)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#ff4444" stroke-width="3" transform="rotate(27)"/>
      <line x1="0" y1="-95" x2="0" y2="-88" stroke="#ff4444" stroke-width="2" transform="rotate(40.5)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#ff4444" stroke-width="3" transform="rotate(54)"/>
    </g>

    <g id="rpm-ticks">
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-135)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-108)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-81)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-54)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(-27)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#666" stroke-width="3" transform="rotate(0)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#ff4444" stroke-width="3" transform="rotate(27)"/>
      <line x1="0" y1="-95" x2="0" y2="-85" stroke="#ff4444" stroke-width="3" transform="rotate(54)"/>
    </g>
  </defs>

  <!-- Background -->
  <rect class="cluster-bg" x="0" y="0" width="800" height="400" rx="20"/>

  <!-- Left gauge - Tachometer (RPM) -->
  <g id="tachometer" transform="translate(160, 200)" data-vss="Vehicle.Powertrain.CombustionEngine.Speed">
    <circle class="gauge-bg" r="130"/>
    <circle class="gauge-ring" r="100"/>
    <use href="#rpm-ticks"/>

    <!-- RPM numbers -->
    <text class="gauge-text" x="-75" y="75" text-anchor="middle">0</text>
    <text class="gauge-text" x="-85" y="20" text-anchor="middle">1</text>
    <text class="gauge-text" x="-70" y="-35" text-anchor="middle">2</text>
    <text class="gauge-text" x="-35" y="-70" text-anchor="middle">3</text>
    <text class="gauge-text" x="15" y="-80" text-anchor="middle">4</text>
    <text class="gauge-text" x="60" y="-60" text-anchor="middle">5</text>
    <text class="gauge-text" x="80" y="-20" text-anchor="middle" fill="#ff4444">6</text>
    <text class="gauge-text" x="85" y="30" text-anchor="middle" fill="#ff4444">7</text>

    <!-- Needle (pointing to ~3000 RPM) -->
    <polygon class="needle" points="0,-80 -4,10 0,15 4,10" transform="rotate(-27)"/>
    <circle class="needle-cap" r="12"/>

    <text class="gauge-label" x="0" y="50" text-anchor="middle">RPM</text>
    <text class="gauge-unit" x="0" y="68" text-anchor="middle">x1000</text>
  </g>

  <!-- Right gauge - Speedometer -->
  <g id="speedometer" transform="translate(640, 200)" data-vss="Vehicle.Speed">
    <circle class="gauge-bg" r="130"/>
    <circle class="gauge-ring" r="100"/>
    <use href="#speed-ticks"/>

    <!-- Speed numbers -->
    <text class="gauge-text" x="-75" y="75" text-anchor="middle">0</text>
    <text class="gauge-text" x="-90" y="25" text-anchor="middle">20</text>
    <text class="gauge-text" x="-80" y="-25" text-anchor="middle">40</text>
    <text class="gauge-text" x="-50" y="-60" text-anchor="middle">60</text>
    <text class="gauge-text" x="0" y="-78" text-anchor="middle">80</text>
    <text class="gauge-text" x="50" y="-60" text-anchor="middle">100</text>
    <text class="gauge-text" x="80" y="-25" text-anchor="middle" fill="#ff4444">120</text>
    <text class="gauge-text" x="90" y="25" text-anchor="middle" fill="#ff4444">140</text>
    <text class="gauge-text" x="75" y="75" text-anchor="middle" fill="#ff4444">160</text>

    <!-- Digital speed display -->
    <rect x="-35" y="15" width="70" height="35" rx="3" fill="#000" stroke="#333"/>
    <text class="gauge-value" x="0" y="42" text-anchor="middle">65</text>

    <!-- Needle (pointing to ~65 mph) -->
    <polygon class="needle" points="0,-80 -4,10 0,15 4,10" transform="rotate(-27)"/>
    <circle class="needle-cap" r="12"/>

    <text class="gauge-label" x="0" y="70" text-anchor="middle">MPH</text>
  </g>

  <!-- Center info display -->
  <g id="info-display" transform="translate(400, 180)">
    <rect class="info-display" x="-100" y="-60" width="200" height="120" rx="5"/>

    <!-- Odometer -->
    <text class="info-text" x="0" y="-35" text-anchor="middle" data-vss="Vehicle.TraveledDistance">ODO: 45,892 mi</text>

    <!-- Trip -->
    <text class="info-text" x="0" y="-10" text-anchor="middle" data-vss="Vehicle.TripMeterReading">TRIP: 234.5 mi</text>

    <!-- Outside temp -->
    <text class="info-text" x="0" y="15" text-anchor="middle" data-vss="Vehicle.Exterior.AirTemperature">OUTSIDE: 72°F</text>

    <!-- Time -->
    <text class="info-text" x="0" y="40" text-anchor="middle">10:34 AM</text>
  </g>

  <!-- Fuel gauge (left of center) -->
  <g id="fuel-gauge" transform="translate(280, 320)" data-vss="Vehicle.Powertrain.FuelSystem.Level">
    <rect class="fuel-gauge" x="-50" y="-15" width="100" height="30" rx="3"/>
    <rect class="fuel-level" x="-47" y="-12" width="70" height="24" rx="2"/>
    <text class="gauge-text" x="-55" y="5" text-anchor="end">E</text>
    <text class="gauge-text" x="55" y="5" text-anchor="start">F</text>
    <!-- Fuel pump icon -->
    <text x="0" y="-25" text-anchor="middle" fill="#888" font-size="16">⛽</text>
  </g>

  <!-- Temperature gauge (right of center) -->
  <g id="temp-gauge" transform="translate(520, 320)" data-vss="Vehicle.Powertrain.CombustionEngine.EngineCoolant.Temperature">
    <rect class="temp-gauge" x="-50" y="-15" width="100" height="30" rx="3"/>
    <rect x="-47" y="-12" width="50" height="24" rx="2" fill="#00aaff"/>
    <text class="gauge-text" x="-55" y="5" text-anchor="end" fill="#00aaff">C</text>
    <text class="gauge-text" x="55" y="5" text-anchor="start" fill="#ff4444">H</text>
    <!-- Thermometer icon -->
    <text x="0" y="-25" text-anchor="middle" fill="#888" font-size="16">🌡</text>
  </g>

  <!-- Warning lights row 1 (top) -->
  <g id="warning-lights-top" transform="translate(400, 60)">
    <!-- Turn signals -->
    <g id="turn-left" transform="translate(-180, 0)" data-vss="Vehicle.Body.Lights.DirectionIndicator.Left.IsSignaling">
      <circle class="warning-light off" r="18" style="color: #00ff00;"/>
      <polygon class="warning-icon" points="-8,0 4,-8 4,-4 10,-4 10,4 4,4 4,8" fill="#00ff00"/>
    </g>

    <g id="turn-right" transform="translate(180, 0)" data-vss="Vehicle.Body.Lights.DirectionIndicator.Right.IsSignaling">
      <circle class="warning-light off" r="18" style="color: #00ff00;"/>
      <polygon class="warning-icon" points="8,0 -4,-8 -4,-4 -10,-4 -10,4 -4,4 -4,8" fill="#00ff00"/>
    </g>

    <!-- High beam -->
    <g id="high-beam" transform="translate(-120, 0)" data-vss="Vehicle.Body.Lights.Beam.High.IsOn">
      <circle class="warning-light off" r="18" style="color: #0088ff;"/>
      <ellipse class="warning-icon" cx="-3" cy="0" rx="6" ry="4" fill="#0088ff"/>
      <line x1="5" y1="-6" x2="12" y2="-6" stroke="#0088ff" stroke-width="2" class="warning-icon"/>
      <line x1="5" y1="-2" x2="12" y2="-2" stroke="#0088ff" stroke-width="2" class="warning-icon"/>
      <line x1="5" y1="2" x2="12" y2="2" stroke="#0088ff" stroke-width="2" class="warning-icon"/>
      <line x1="5" y1="6" x2="12" y2="6" stroke="#0088ff" stroke-width="2" class="warning-icon"/>
    </g>

    <!-- Parking/position lights -->
    <g id="parking-lights" transform="translate(-60, 0)" data-vss="Vehicle.Body.Lights.Running.IsOn">
      <circle class="warning-light off" r="18" style="color: #00aa00;"/>
      <ellipse class="warning-icon" cx="0" cy="0" rx="5" ry="4" fill="#00aa00"/>
      <line x1="-8" y1="-3" x2="-12" y2="-5" stroke="#00aa00" stroke-width="2" class="warning-icon"/>
      <line x1="-8" y1="3" x2="-12" y2="5" stroke="#00aa00" stroke-width="2" class="warning-icon"/>
      <line x1="8" y1="-3" x2="12" y2="-5" stroke="#00aa00" stroke-width="2" class="warning-icon"/>
      <line x1="8" y1="3" x2="12" y2="5" stroke="#00aa00" stroke-width="2" class="warning-icon"/>
    </g>

    <!-- Fog lights -->
    <g id="fog-lights" transform="translate(0, 0)" data-vss="Vehicle.Body.Lights.Fog.Front.IsOn">
      <circle class="warning-light off" r="18" style="color: #ffaa00;"/>
      <ellipse class="warning-icon" cx="-3" cy="0" rx="5" ry="4" fill="#ffaa00"/>
      <path class="warning-icon" d="M4,-6 Q10,-6 8,0 Q10,6 4,6" stroke="#ffaa00" stroke-width="2" fill="none"/>
    </g>

    <!-- Hazard -->
    <g id="hazard" transform="translate(60, 0)" data-vss="Vehicle.Body.Lights.Hazard.IsSignaling">
      <circle class="warning-light off" r="18" style="color: #ff0000;"/>
      <polygon class="warning-icon" points="0,-10 10,8 -10,8" fill="none" stroke="#ff0000" stroke-width="2"/>
      <text class="warning-icon" x="0" y="5" text-anchor="middle" fill="#ff0000" font-size="12" font-weight="bold">!</text>
    </g>

    <!-- Cruise control -->
    <g id="cruise" transform="translate(120, 0)" data-vss="Vehicle.ADAS.CruiseControl.IsActive">
      <circle class="warning-light off" r="18" style="color: #00ff00;"/>
      <circle class="warning-icon" cx="0" cy="0" r="8" fill="none" stroke="#00ff00" stroke-width="2"/>
      <path class="warning-icon" d="M-4,3 L0,-2 L4,3" fill="none" stroke="#00ff00" stroke-width="2"/>
    </g>
  </g>

  <!-- Warning lights row 2 (critical warnings) -->
  <g id="warning-lights-critical" transform="translate(400, 370)">
    <!-- Check engine -->
    <g id="check-engine" transform="translate(-160, 0)" data-vss="Vehicle.OBD.Status">
      <circle class="warning-light off" r="16" style="color: #ffaa00;"/>
      <path class="warning-icon" d="M-8,2 L-6,-4 L-2,-4 L-2,-8 L6,-8 L6,-4 L10,-4 L10,6 L-8,6 Z" fill="#ffaa00" transform="scale(0.8)"/>
    </g>

    <!-- Oil pressure -->
    <g id="oil-pressure" transform="translate(-112, 0)" data-vss="Vehicle.Powertrain.CombustionEngine.OilPressureLow">
      <circle class="warning-light off" r="16" style="color: #ff0000;"/>
      <ellipse class="warning-icon" cx="0" cy="2" rx="8" ry="5" fill="#ff0000" transform="scale(0.8)"/>
      <path class="warning-icon" d="M0,-6 Q-2,-8 0,-8 Q2,-8 0,-6" fill="#ff0000" transform="scale(0.8)"/>
    </g>

    <!-- Battery -->
    <g id="battery" transform="translate(-64, 0)" data-vss="Vehicle.Powertrain.TractionBattery.StateOfCharge.Low">
      <circle class="warning-light off" r="16" style="color: #ff0000;"/>
      <rect class="warning-icon" x="-8" y="-4" width="16" height="10" rx="1" fill="#ff0000" transform="scale(0.8)"/>
      <rect class="warning-icon" x="-2" y="-6" width="4" height="3" fill="#ff0000" transform="scale(0.8)"/>
      <text class="warning-icon" x="-4" y="3" fill="#1a1a1a" font-size="8" font-weight="bold">+</text>
      <text class="warning-icon" x="2" y="3" fill="#1a1a1a" font-size="8" font-weight="bold">−</text>
    </g>

    <!-- Temperature warning -->
    <g id="temp-warning" transform="translate(-16, 0)" data-vss="Vehicle.Powertrain.CombustionEngine.EngineCoolant.TemperatureHigh">
      <circle class="warning-light off" r="16" style="color: #ff0000;"/>
      <path class="warning-icon" d="M0,-8 L0,2 M-4,4 Q0,10 4,4" fill="none" stroke="#ff0000" stroke-width="2" transform="scale(0.8)"/>
    </g>

    <!-- Brake warning -->
    <g id="brake-warning" transform="translate(32, 0)" data-vss="Vehicle.Chassis.Brake.IsWarning">
      <circle class="warning-light off" r="16" style="color: #ff0000;"/>
      <circle class="warning-icon" cx="0" cy="0" r="7" fill="none" stroke="#ff0000" stroke-width="2" transform="scale(0.8)"/>
      <text class="warning-icon" x="0" y="4" text-anchor="middle" fill="#ff0000" font-size="10" font-weight="bold">!</text>
    </g>

    <!-- ABS -->
    <g id="abs" transform="translate(80, 0)" data-vss="Vehicle.Chassis.Brake.ABS.IsWarning">
      <circle class="warning-light off" r="16" style="color: #ffaa00;"/>
      <text class="warning-icon" x="0" y="4" text-anchor="middle" fill="#ffaa00" font-size="10" font-weight="bold">ABS</text>
    </g>

    <!-- Airbag -->
    <g id="airbag" transform="translate(128, 0)" data-vss="Vehicle.Cabin.Airbag.IsWarning">
      <circle class="warning-light off" r="16" style="color: #ff0000;"/>
      <circle class="warning-icon" cx="0" cy="-2" r="4" fill="#ff0000" transform="scale(0.8)"/>
      <ellipse class="warning-icon" cx="0" cy="6" rx="6" ry="4" fill="#ff0000" transform="scale(0.8)"/>
    </g>

    <!-- Seatbelt -->
    <g id="seatbelt" transform="translate(176, 0)" data-vss="Vehicle.Cabin.Seat.Row1.DriverSide.IsBelted">
      <circle class="warning-light off" r="16" style="color: #ff0000;"/>
      <circle class="warning-icon" cx="0" cy="-5" r="3" fill="#ff0000" transform="scale(0.8)"/>
      <path class="warning-icon" d="M-4,0 L0,8 L4,0 M-6,2 L6,2" fill="none" stroke="#ff0000" stroke-width="2" transform="scale(0.8)"/>
    </g>

    <!-- TPMS -->
    <g id="tpms" transform="translate(-208, 0)" data-vss="Vehicle.Chassis.Axle.Row1.Wheel.Left.Tire.IsPressureLow">
      <circle class="warning-light off" r="16" style="color: #ffaa00;"/>
      <circle class="warning-icon" cx="0" cy="2" r="6" fill="none" stroke="#ffaa00" stroke-width="2" transform="scale(0.8)"/>
      <path class="warning-icon" d="M0,-2 L0,4 M0,6 L0,7" fill="none" stroke="#ffaa00" stroke-width="2" transform="scale(0.8)"/>
    </g>

    <!-- Door ajar -->
    <g id="door-ajar" transform="translate(224, 0)" data-vss="Vehicle.Cabin.Door.Row1.DriverSide.IsOpen">
      <circle class="warning-light off" r="16" style="color: #ff0000;"/>
      <rect class="warning-icon" x="-6" y="-6" width="10" height="12" rx="1" fill="none" stroke="#ff0000" stroke-width="2" transform="scale(0.8)"/>
      <path class="warning-icon" d="M4,-4 L8,-2 L8,4 L4,6" fill="none" stroke="#ff0000" stroke-width="2" transform="scale(0.8)"/>
    </g>
  </g>
</svg>
